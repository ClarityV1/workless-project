<!DOCTYPE html>
<html>
<head>
    <style>
        body { width: 200px; padding: 15px; font-family: sans-serif; background: #f9fafb; }
        h3 { margin-top: 0; color: #1f2937; }
        button { width: 100%; padding: 10px; margin-bottom: 8px; cursor: pointer; border: none; border-radius: 6px; color: white; font-weight: bold; transition: opacity 0.2s; }
        button:active { opacity: 0.8; }
        #start { background: #22c55e; }
        #stop { background: #64748b; }
        #run { background: #3b82f6; }
        #status { font-size: 12px; color: #6b7280; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>
    <h3>WorkLess</h3>
    <button id="start">Start Recording</button>
    <button id="stop">Stop & Save</button>
    <button id="run">Run Auto-Fill</button>
    <div id="status">Ready...</div>
    <script src="popup.js"></script>
</body>
</html>
