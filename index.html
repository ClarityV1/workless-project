<script>
    console.log("Brain is awake and listening...");

    window.addEventListener("message", (event) => {
        // Pulse Check: This will show up in your console if ANY message arrives
        console.log("Message received from:", event.origin);
        
        if (event.data && event.data.type === "WORKLESS_TASK") {
            const data = event.data.payload;
            const display = document.getElementById('display');
            
            if (!data || data.length === 0) {
                display.innerHTML = "Recording stopped, but no clicks were detected.";
                return;
            }

            display.innerHTML = "<h3>Captured Steps:</h3>";
            data.forEach((step, index) => {
                display.innerHTML += `
                    <div style="padding: 10px; border-bottom: 1px solid #eee;">
                        <strong>Step ${index + 1}:</strong> Clicked ${step.element} 
                        (Text: "${step.text}")
                    </div>`;
            });
        }
    });
</script>
