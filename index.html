<!DOCTYPE html>
<html>
<head>
    <title>WorkLess Brain</title>
    <style>
        body { font-family: sans-serif; padding: 40px; background: #f0f2f5; }
        #display { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .entry { padding: 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>
    <h1>WorkLess Apprentice Log</h1>
    <div id="display">Waiting for data from extension...</div>

    <script>
        window.addEventListener("message", (event) => {
            if (event.data && event.data.type === "WORKLESS_TASK") {
                const data = event.data.payload;
                const display = document.getElementById('display');
                display.innerHTML = "<h3>Live Recording Data:</h3>";
                data.forEach((step, i) => {
                    display.innerHTML += `<div class="entry">Step ${i+1}: <b>${step.text}</b> (${step.element})</div>`;
                });
            }
        });
    </script>
</body>
</html>
