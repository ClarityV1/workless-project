<!DOCTYPE html>
<html>
<head>
    <title>WorkLess Brain</title>
    <style>
        body { font-family: sans-serif; padding: 40px; background: #f4f4f9; }
        #display { background: white; padding: 20px; border-radius: 8px; border: 1px solid #ddd; }
    </style>
</head>
<body>
    <h1>WorkLess Brain</h1>
    <div id="display">Waiting for Apprentice...</div>

    <script>
        window.addEventListener("message", (event) => {
            if (event.data && event.data.type === "WORKLESS_TASK") {
                const data = event.data.payload;
                const display = document.getElementById('display');
                display.innerHTML = "<h3>Steps Received:</h3>";
                data.forEach((step, index) => {
                    display.innerHTML += `<p>Step ${index + 1}: Clicked ${step.element} (${step.text})</p>`;
                });
            }
        });
    </script>
</body>
</html>
